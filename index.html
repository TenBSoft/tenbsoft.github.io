<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AB Repeater Pro - Support</title>
    <style>
        body {
            background-color: #121212; /* 고급스러운 다크 배경 */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            color: #64FFDA; /* 영롱한 민트색 포인트 */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #b3b3b3;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .btn {
            background-color: #64FFDA;
            color: #121212;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            transition: background-color 0.3s ease;
            display: inline-block;
        }
        .btn:hover {
            background-color: #4cd3b6;
        }
        /* ⭐️ 자바스크립트가 작동하기 전까지 두 화면을 모두 숨겨둡니다 */
        #content-ko, #content-en {
            display: none;
        }
    </style>
</head>
<body>

    <div id="content-ko">
        <h1>AB Repeater Pro</h1>
        <p>앱 사용 설명서 및 고객 지원은<br>TenBSoft 공식 블로그에서 확인하실 수 있습니다.</p>
        <a href="https://blog.naver.com/yunalove21" class="btn">공식 블로그로 이동하기</a>
    </div>

    <div id="content-en">
        <h1>AB Repeater Pro</h1>
        <p>For the user manual and customer support,<br>please visit the official TenBSoft blog.</p>
        <a href="https://blog.naver.com/yunalove21" class="btn">Go to Official Blog</a>
    </div>

    <script>
        // 접속한 사람의 브라우저 언어를 확인합니다 (예: 'ko-KR', 'en-US' 등)
        var userLang = navigator.language || navigator.userLanguage; 
        
        // 만약 언어가 'ko'(한국어)로 시작한다면 한국어 화면을 켜고, 아니면 영어 화면을 켭니다.
        if (userLang.startsWith('ko')) {
            document.getElementById('content-ko').style.display = 'block';
        } else {
            document.getElementById('content-en').style.display = 'block';
        }
    </script>

</body>
</html>
